services:
  - type: web
    name: climate-forecasting-dashboard
    env: python
    plan: free
    branch: main
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: bash -lc "python -m pip install -r requirements.txt && python -m streamlit run dashboard.py --server.port $PORT --server.enableCORS false"
